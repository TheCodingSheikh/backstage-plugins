name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "plugins/**/package.json"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate type declarations
        run: yarn tsc

      - name: Build and publish bumped packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          failed=()
          for f in $(find plugins -name package.json -not -path '*/node_modules/*'); do
            private=$(jq -r '.private // false' "$f")
            [ "$private" = "true" ] && continue
            name=$(jq -r '.name' "$f")
            version=$(jq -r '.version' "$f")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already on npm, skipping"
              continue
            fi
            echo "::group::Publishing $name@$version"
            if ! (yarn workspace "$name" build && cd "$(dirname "$f")" && npm publish --provenance --access public); then
              echo "::error::Failed to publish $name@$version"
              failed+=("$name@$version")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::The following packages failed: ${failed[*]}"
            exit 1
          fi
