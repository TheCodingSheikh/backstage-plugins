name: "Build & Release Dynamic Plugins"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "DYNAMIC-PLUGINS.yaml"

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from DYNAMIC-PLUGINS.yaml
        id: plan
        run: |
          set -euo pipefail
          matrix=$(yq -o=json -I=0 '.plugins' DYNAMIC-PLUGINS.yaml)
          echo "Planned $(printf '%s' "$matrix" | yq 'length') entries ($(printf '%s' "$matrix" | wc -c) bytes)."
          {
            echo 'matrix<<__EOF__'
            printf '%s\n' "$matrix"
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

  build-release:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.plugin.repo || github.repository }}
          ref: ${{ matrix.plugin.ref }}
          fetch-depth: 0

      - name: Read plugin metadata
        id: meta
        run: |
          pkg="${{ matrix.plugin.path }}/package.json"
          if [ ! -f "$pkg" ]; then
            echo "::error::Missing $pkg in ${{ matrix.plugin.repo || github.repository }}@${{ matrix.plugin.ref || 'default' }}"
            exit 1
          fi
          name=$(jq -r '.name' "$pkg" | sed 's/@//; s/\//-/g')
          pkg_version=$(jq -r '.version' "$pkg")
          expected="${{ matrix.plugin.version }}"
          if [ "$pkg_version" != "$expected" ]; then
            echo "::error::Version mismatch for ${{ matrix.plugin.path }}: DYNAMIC-PLUGINS.yaml=$expected but package.json=$pkg_version"
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$expected" >> "$GITHUB_OUTPUT"
          echo "tag=${name}-v${expected}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.meta.outputs.tag }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.release_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Enable corepack
        if: steps.release_check.outputs.exists == 'false'
        run: corepack enable

      - name: Install workspace dependencies
        if: steps.release_check.outputs.exists == 'false'
        run: |
          cd "${{ matrix.plugin.workspaceDir || '.' }}"
          yarn install

      - name: Run custom command before export
        if: steps.release_check.outputs.exists == 'false' && matrix.plugin.customCommand != ''
        continue-on-error: true
        run: |
          cd "${{ matrix.plugin.workspaceDir || '.' }}"
          ${{ matrix.plugin.customCommand }}

      - name: Install plugin dependencies
        if: steps.release_check.outputs.exists == 'false' && !matrix.plugin.workspaceDir
        run: |
          cd "${{ matrix.plugin.path }}"
          yarn install

      - name: Export dynamic plugin
        if: steps.release_check.outputs.exists == 'false'
        run: |
          cd "${{ matrix.plugin.path }}"
          npx @red-hat-developer-hub/cli@latest plugin export ${{ matrix.plugin.exportArgs }}

      - name: Package plugin (npm pack)
        if: steps.release_check.outputs.exists == 'false'
        id: package
        run: |
          cd "${{ matrix.plugin.path }}/dist-dynamic"
          npm pack --json > pack.json
          tarball=$(jq -r '.[0].filename' pack.json)
          integrity=$(jq -r '.[0].integrity' pack.json)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "integrity=$integrity" >> "$GITHUB_OUTPUT"

      - name: Create integrity file
        if: steps.release_check.outputs.exists == 'false'
        run: echo "${{ steps.package.outputs.integrity }}" > integrity.txt

      - name: Create body.md
        if: steps.release_check.outputs.exists == 'false'
        env:
          PLUGIN_CONFIG: ${{ matrix.plugin.config }}
          PACKAGE_URL: "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/${{ steps.package.outputs.tarball }}"
          INTEGRITY: ${{ steps.package.outputs.integrity }}
        run: |
          {
            echo "### Install Config"
            echo '```yaml'
            echo "- disabled: false"
            echo "  package: \"$PACKAGE_URL\""
            echo "  integrity: $INTEGRITY"
            if [ -n "$PLUGIN_CONFIG" ]; then
              printf '%s\n' "$PLUGIN_CONFIG" | sed 's/^/  /'
            fi
            echo '```'
          } > body.md

      - name: Publish GitHub Release
        if: steps.release_check.outputs.exists == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }} v${{ steps.meta.outputs.version }}
          makeLatest: true
          bodyFile: "body.md"
          artifacts: ${{ matrix.plugin.path }}/dist-dynamic/${{ steps.package.outputs.tarball }},integrity.txt
