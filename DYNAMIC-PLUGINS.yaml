# Source of truth for dynamic plugin releases.
#
# Edit a plugin's `version` (or add a new entry) and push to `main` to have the
# `Build & Release Dynamic Plugins` workflow build and publish a GitHub Release
# under tag `<sanitized-name>-v<version>`. The workflow is idempotent: entries
# whose release tag already exists are skipped, so only new versions publish.
#
# Fields per entry:
#   path           (required) Path to the plugin package (relative to the
#                             source repo root — this repo by default, or the
#                             repo specified by `repo` below).
#   version        (required) Must match the plugin's package.json version at
#                             the chosen ref.
#   repo           (optional) `owner/name` of an external repo that hosts the
#                             plugin source. Defaults to this repo.
#   ref            (optional) Branch, tag, or SHA in `repo` to build from.
#                             Defaults to the default branch (external repos)
#                             or the triggering commit (this repo).
#   workspaceDir   (optional) Path to a nested Yarn workspace root inside the
#                             source repo, for monorepos like
#                             `backstage/community-plugins` where each
#                             `workspaces/<name>` is its own Yarn project with
#                             its own lockfile. When set, the workflow runs
#                             `yarn install` (and any `customCommand`) inside
#                             this directory instead of the repo root, and
#                             skips the per-plugin `yarn install`.
#   exportArgs     (optional) Extra args passed to `plugin export`.
#   customCommand  (optional) Command run in `workspaceDir` (or the source
#                             repo root if `workspaceDir` is unset) before
#                             export — e.g. `yarn tsc` to build siblings.
#   config         (optional) YAML fragment appended inside the install-config
#                             list item in the release body. Typically starts
#                             with `pluginConfig:` at column 0; the workflow
#                             indents every line by 2 spaces for you.
#   keepSchemas    (optional) Allow-list of top-level config-schema property
#                             keys this plugin is permitted to contribute.
#                             Every other `.properties.*` entry bundled by the
#                             export CLI (including anything pulled in
#                             transitively from unrelated `@backstage/*` deps)
#                             is stripped. Default is an empty allow-list —
#                             omit the field when the plugin owns no
#                             app-config keys.
#                               - absent       → empty schema (owns nothing)
#                               - `[foo, bar]` → keep only those keys
#                             Applied after `plugin export`, before `npm pack`.

plugins:
  - path: plugins/entity-scaffolder
    version: 0.4.2
    config: |
      pluginConfig:
        dynamicPlugins:
          frontend:
            thecodingsheikh.backstage-plugin-entity-scaffolder:
              entityTabs:
                - path: /entity-scaffolder
                  title: Manage
                  mountPoint: entity.page.entity-scaffolder
              mountPoints:
                - mountPoint: entity.page.entity-scaffolder/cards
                  importName: EntityScaffolderContent
                  config:
                    layout:
                      gridColumn: "1 / -1"
                    if:
                      allOf:
                        - isEntityScaffolderAvailable

  - path: plugins/catalog-backend-module-kubernetes
    version: 0.1.2
    keepSchemas: [catalog]
    customCommand: yarn tsc
    config: |
      pluginConfig:
        catalog:
          providers:
            kubernetes:
              main:
                mappings:
                  namespaceModel: 'default'
                  nameModel: 'name-kind'
                  titleModel: 'name'
                  systemModel: 'namespace'
                  referencesNamespaceModel: 'default'
                components:
                  enabled: true
                schedule:
                  frequency: { seconds: 20 }
                  timeout: { seconds: 600 }

  - path: plugins/multi-owner/multi-owner
    version: 1.0.5
    config: |
      pluginConfig:
        dynamicPlugins:
          frontend:
            thecodingsheikh.backstage-plugin-multi-owner:
              mountPoints:
                - mountPoint: entity.page.overview/cards
                  importName: EntityMultiOwnerCard
                  config:
                    layout:
                      gridColumnEnd:
                        lg: "span 8"
                        xs: "span 12"
                    if:
                      allOf:
                        - isMultiOwnerAvailable

  - path: plugins/multi-owner/catalog-backend-module-multi-owner-processor
    version: 1.0.6
    customCommand: yarn tsc

  - path: plugins/scaffolder-field-validator
    version: 1.2.1
    config: |
      pluginConfig:
        dynamicPlugins:
          frontend:
            thecodingsheikh.backstage-plugin-scaffolder-field-validator:
              scaffolderFieldExtensions:
                - importName: ScaffolderFieldValidatorExtension

  # Roadie's main is still on Backstage 1.44.2 — closest available pin; no 1.45.x source exists yet.
  - repo: RoadieHQ/roadie-backstage-plugins
    ref: e231713f2276d310649706a26d25753b1e823d67
    path: plugins/scaffolder-field-extensions/scaffolder-frontend-module-http-request-field
    version: 2.3.0
    config: |
      pluginConfig:
        dynamicPlugins:
          frontend:
            roadiehq.plugin-scaffolder-frontend-module-http-request-field:
              scaffolderFieldExtensions:
                - importName: SelectFieldFromApiExtension

  - repo: backstage/community-plugins
    ref: 3be39dd9870b7b36822da3b93864b7dad9d434eb
    workspaceDir: workspaces/vault
    path: workspaces/vault/plugins/vault
    version: 0.13.0
    keepSchemas: [vault]
    customCommand: yarn tsc
    config: |
      pluginConfig:
        vault:
          baseUrl: ${VAULT_BASE_URL}
          publicUrl: ${VAULT_PUBLIC_URL}
          auth:
            type: static
            secret: ${VAULT_TOKEN}
          secretEngine: secrets
          kvVersion: 2
        dynamicPlugins:
          frontend:
            backstage-community.plugin-vault:
              mountPoints:
                - mountPoint: entity.page.overview/cards
                  importName: EntityVaultCard
                  config:
                    layout:
                      gridColumnEnd:
                        lg: "span 8"
                        xs: "span 12"
                    if:
                      allOf:
                        - isKind: component
                        - hasAnnotation: vault.io/secrets-path

  - repo: backstage/community-plugins
    ref: 3be39dd9870b7b36822da3b93864b7dad9d434eb
    workspaceDir: workspaces/vault
    path: workspaces/vault/plugins/vault-backend
    version: 0.15.0
    customCommand: yarn tsc


  - repo: backstage/community-plugins
    ref: bc8d7282d0f9f313198df021db3470364fb52ad2
    workspaceDir: workspaces/grafana
    path: workspaces/grafana/plugins/grafana
    version: 0.10.1
    keepSchemas: [grafana]
    customCommand: yarn tsc
    config: |
      pluginConfig:
        proxy:
          endpoints:
            /grafana/api:
              target: ${GRAFANA_ENDPOINT}/
              headers:
                Authorization: "Bearer ${GRAFANA_TOKEN}"
        grafana:
          domain: ${GRAFANA_PUBLIC_DOMAIN}
        dynamicPlugins:
          frontend:
            backstage-community.plugin-grafana:
              entityTabs:
                - path: /grafana
                  title: Grafana
                  mountPoint: entity.page.grafana
              mountPoints:
                - mountPoint: entity.page.grafana/cards
                  importName: EntityOverviewDashboardViewer
                  config:
                    layout:
                      gridColumn: "1 / -1"
                    if:
                      allOf:
                        - isKind: component
                        - hasAnnotation: grafana/overview-dashboard
                - mountPoint: entity.page.grafana/cards
                  importName: EntityGrafanaDashboardsCard
                  config:
                    layout:
                      gridColumnEnd:
                        lg: "span 8"
                        xs: "span 12"
                    if:
                      allOf:
                        - isKind: component
                        - hasAnnotation: grafana/dashboard-selector
                - mountPoint: entity.page.grafana/cards
                  importName: EntityGrafanaAlertsCard
                  config:
                    layout:
                      gridColumnEnd:
                        lg: "span 8"
                        xs: "span 12"
                    if:
                      allOf:
                        - isKind: component
                        - anyOf:
                            - hasAnnotation: grafana/alert-label-selector
                            - hasAnnotation: grafana/tag-selector
