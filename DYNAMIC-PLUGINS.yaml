# Source of truth for dynamic plugin releases.
#
# Edit a plugin's `version` (or add a new entry) and push to `main` to have the
# `Build & Release Dynamic Plugins` workflow build and publish a GitHub Release
# under tag `<sanitized-name>-v<version>`. The workflow is idempotent: entries
# whose release tag already exists are skipped, so only new versions publish.
#
# Fields per entry:
#   path           (required) Path to the plugin package (relative to the
#                             source repo root — this repo by default, or the
#                             repo specified by `repo` below).
#   version        (required) Must match the plugin's package.json version at
#                             the chosen ref.
#   repo           (optional) `owner/name` of an external repo that hosts the
#                             plugin source. Defaults to this repo.
#   ref            (optional) Branch, tag, or SHA in `repo` to build from.
#                             Defaults to the default branch (external repos)
#                             or the triggering commit (this repo).
#   exportArgs     (optional) Extra args passed to `plugin export`.
#   customCommand  (optional) Command run in the source repo root before
#                             export (e.g. `yarn tsc`).
#   config         (optional) YAML fragment appended inside the install-config
#                             list item in the release body. Typically starts
#                             with `pluginConfig:` at column 0; the workflow
#                             indents every line by 2 spaces for you.

plugins:
  - path: plugins/entity-scaffolder
    version: 0.3.0
    config: |
      pluginConfig:
        dynamicPlugins:
          frontend:
            thecodingsheikh.backstage-plugin-entity-scaffolder:
              entityTabs:
                - path: /entity-scaffolder
                  title: Manage
                  mountPoint: entity.page.entity-scaffolder
              mountPoints:
                - mountPoint: entity.page.entity-scaffolder/cards
                  importName: EntityScaffolderContent
                  config:
                    layout:
                      gridColumn: "1 / -1"
                    if:
                      allOf:
                        - isEntityScaffolderAvailable

  - repo: terasky-oss/backstage-plugins
    ref: main
    path: plugins/kubernetes-ingestor
    version: 3.14.0
    customCommand: yarn tsc
    config: |
      pluginConfig:
        kubernetesIngestor:
          mappings:
            namespaceModel: 'default'
            nameModel: 'name-kind'
            titleModel: 'name'
            systemModel: 'namespace'
            referencesNamespaceModel: 'default'
          components:
            enabled: true
            taskRunner:
              frequency: 20
              timeout: 600
            onlyIngestAnnotatedResources: true
          crossplane:
            enabled: false

  - path: plugins/multi-owner/multi-owner
    version: 1.0.4
    config: |
      pluginConfig:
        dynamicPlugins:
          frontend:
            thecodingsheikh.backstage-plugin-multi-owner:
              mountPoints:
                - mountPoint: entity.page.overview/cards
                  importName: EntityMultiOwnerCard
                  config:
                    layout:
                      gridColumnEnd:
                        lg: "span 8"
                        xs: "span 12"
                    if:
                      allOf:
                        - isMultiOwnerAvailable

  - path: plugins/multi-owner/catalog-backend-module-multi-owner-processor
    version: 1.0.4

  - path: plugins/scaffolder-field-validator
    version: 1.0.0
    config: |
      pluginConfig:
        dynamicPlugins:
          frontend:
            thecodingsheikh.backstage-plugin-scaffolder-field-validator:
              scaffolderFieldExtensions:
                - importName: ScaffolderFieldValidatorExtension

  - repo: RoadieHQ/roadie-backstage-plugins
    ref: main
    path: plugins/frontend/scaffolder-frontend-module-http-request-field
    version: 2.3.0
    config: |
      pluginConfig:
        dynamicPlugins:
          frontend:
            roadiehq.plugin-scaffolder-frontend-module-http-request-field:
              scaffolderFieldExtensions:
                - importName: SelectFieldFromApiExtension
