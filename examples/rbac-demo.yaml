# ---------------------------------------------------------------------------
# Case 4 — annotation: 'edit,admin', guest group's role is 'edit'.
# Expected: ALLOWED (role is one of the allowed set).
# ---------------------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: rbac-demo-multi-role-allowed
  description: scaffolder-edit-roles=edit,admin, guests has role edit → ALLOWED
  annotations:
    backstage.io/scaffolder-template: template:default/entity-scaffolder-template
    backstage.io/last-applied-configuration: |
      {"name":"rbac-demo-multi-role-allowed","description":"Edit or admin, guest has edit","environment":"staging","priority":6,"owner":"group:default/guests","visibility":"private","language":"typescript","framework":"express","enableDocker":true,"enableCI":true,"ports":[3000]}
    backstage.io/scaffolder-edit-roles: 'edit,admin'
    backstage.io/immutable-fields: 'name'
