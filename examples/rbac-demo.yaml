---
# ---------------------------------------------------------------------------
# Case 5 — annotation: 'admin', only the platform group has role admin.
# Expected: DENIED. Guest is not in platform; no guest-owner with admin role.
# ---------------------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: rbac-demo-platform-admin
  description: scaffolder-edit-roles=admin, guests (edit) + platform (admin) → DENIED for guest
  annotations:
    backstage.io/scaffolder-template: template:default/entity-scaffolder-template
    backstage.io/last-applied-configuration: |
      {"name":"rbac-demo-platform-admin","description":"Platform owns as admin, guest only edits","environment":"production","priority":10,"owner":"group:default/platform","visibility":"private","language":"typescript","framework":"express","enableDocker":true,"enableCI":true,"ports":[3000]}
    backstage.io/scaffolder-edit-roles: 'admin'
    backstage.io/immutable-fields: 'name'
spec:
  type: service
  lifecycle: production
  owner: platform
  system: examples
  owners:
    - name: group:default/platform
      role: admin
    - name: group:default/guests
      role: edit
