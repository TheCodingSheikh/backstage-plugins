# ---------------------------------------------------------------------------
# Case 1 — no annotation.
# Expected: guest sees and uses the scaffolder tab (fallback to IS_ENTITY_OWNER).
# ---------------------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: rbac-demo-no-annotation
  description: No scaffolder-edit-roles annotation. Any owner may edit.
  annotations:
    backstage.io/scaffolder-template: template:default/entity-scaffolder-template
    backstage.io/last-applied-configuration: |
      {"name":"rbac-demo-no-annotation","description":"Fallback owner check","environment":"staging","priority":5,"owner":"group:default/guests","visibility":"private","language":"typescript","framework":"express","enableDocker":true,"enableCI":true,"ports":[3000]}
    backstage.io/immutable-fields: 'name'
spec:
  type: service
  lifecycle: experimental
  owner: guests
  system: examples
  owners:
    - name: group:default/guests
      role: edit
---
# ---------------------------------------------------------------------------
# Case 2 — annotation: 'admin', guest group's role is 'edit'.
# Expected: DENIED. The tab renders a "Not authorized" panel.
# ---------------------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: rbac-demo-admin-required-denied
  description: scaffolder-edit-roles=admin, guests has role edit → DENIED
  annotations:
    backstage.io/scaffolder-template: template:default/entity-scaffolder-template
    backstage.io/last-applied-configuration: |
      {"name":"rbac-demo-admin-required-denied","description":"Admin-only, guest has edit role","environment":"production","priority":8,"owner":"group:default/guests","visibility":"private","language":"typescript","framework":"express","enableDocker":true,"enableCI":true,"ports":[3000]}
    backstage.io/scaffolder-edit-roles: 'admin'
    backstage.io/immutable-fields: 'name'
spec:
  type: service
  lifecycle: production
  owner: guests
  system: examples
  owners:
    - name: group:default/guests
      role: edit
---
# ---------------------------------------------------------------------------
